services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: strkt
      POSTGRES_PASSWORD: strkt
      POSTGRES_DB: strkt
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strkt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
